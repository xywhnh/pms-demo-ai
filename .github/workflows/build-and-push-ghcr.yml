name: Build And Push To GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JARs
        run: mvn -B -DskipTests -pl demo-service-a,demo-service-b,demo-service-c -am clean package

      - name: Set image owner to lowercase
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (service-a)
        id: meta_a
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-service-a
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Docker metadata (service-b)
        id: meta_b
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-service-b
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Docker metadata (service-c)
        id: meta_c
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}-service-c
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push service-a
        uses: docker/build-push-action@v6
        with:
          context: demo-service-a
          file: demo-service-a/Dockerfile.runtime
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.meta_a.outputs.tags }}
          labels: ${{ steps.meta_a.outputs.labels }}

      - name: Build and push service-b
        uses: docker/build-push-action@v6
        with:
          context: demo-service-b
          file: demo-service-b/Dockerfile.runtime
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.meta_b.outputs.tags }}
          labels: ${{ steps.meta_b.outputs.labels }}

      - name: Build and push service-c
        uses: docker/build-push-action@v6
        with:
          context: demo-service-c
          file: demo-service-c/Dockerfile.runtime
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.meta_c.outputs.tags }}
          labels: ${{ steps.meta_c.outputs.labels }}
