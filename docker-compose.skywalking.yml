version: "3.8"

services:
  skywalking-oap:
    container_name: skywalking-oap
    image: ${SW_OAP_IMAGE:-docker.1ms.run/apache/skywalking-oap-server:10.1.0}
    restart: unless-stopped
    environment:
      SW_STORAGE: ${SW_STORAGE:-h2}
    ports:
      - "11800:11800"
      - "12800:12800"
    networks:
      - pms-demo-net

  skywalking-ui:
    container_name: skywalking-ui
    image: ${SW_UI_IMAGE:-docker.1ms.run/apache/skywalking-ui:10.1.0}
    restart: unless-stopped
    depends_on:
      - skywalking-oap
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "18080:8080"
    networks:
      - pms-demo-net

  service-b:
    depends_on:
      - skywalking-oap
    environment:
      SW_AGENT_NAME: demo-service-b
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_INSTANCE_NAME: ${HOSTNAME:-docker}-service-b
      SW_GRPC_LOG_SERVER_HOST: skywalking-oap
      SW_GRPC_LOG_SERVER_PORT: "11800"
      JAVA_TOOL_OPTIONS: -javaagent:/skywalking/agent/skywalking-agent.jar
    volumes:
      - ./logs/service-b:/app/logs
      - ./skywalking/agent:/skywalking/agent:ro

  service-a:
    depends_on:
      - service-b
      - skywalking-oap
    environment:
      SERVICE_B_BASE_URL: http://service-b:8082
      SW_AGENT_NAME: demo-service-a
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_INSTANCE_NAME: ${HOSTNAME:-docker}-service-a
      SW_GRPC_LOG_SERVER_HOST: skywalking-oap
      SW_GRPC_LOG_SERVER_PORT: "11800"
      JAVA_TOOL_OPTIONS: -javaagent:/skywalking/agent/skywalking-agent.jar
    volumes:
      - ./logs/service-a:/app/logs
      - ./skywalking/agent:/skywalking/agent:ro

networks:
  pms-demo-net:
    driver: bridge
