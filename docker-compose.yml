services:
  service-c:
    container_name: pms-demo-service-c
    image: ghcr.io/xywhnh/pms-demo-ai-service-c:latest
    restart: unless-stopped
    environment:
      SW_AGENT_NAME: demo-service-c
      SW_AGENT_INSTANCE_NAME: ${HOSTNAME:-app}-service-c
      SW_AGENT_NAMESPACE: ${SW_AGENT_NAMESPACE:-pms-demo}
      SW_AGENT_CLUSTER: ${SW_AGENT_CLUSTER:-default}
      SW_LOGGING_OUTPUT: CONSOLE
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: ${SW_AGENT_COLLECTOR_BACKEND_SERVICES:-10.0.105.128:11800}
      SW_GRPC_LOG_SERVER_HOST: ${SW_GRPC_LOG_SERVER_HOST:-10.0.105.128}
      SW_GRPC_LOG_SERVER_PORT: ${SW_GRPC_LOG_SERVER_PORT:-11800}
      JAVA_TOOL_OPTIONS: -javaagent:/skywalking/agent/skywalking-agent.jar
      ARTHAS_ENABLED: "${ARTHAS_ENABLED:-true}"
      ARTHAS_START_DELAY_SECONDS: "${ARTHAS_START_DELAY_SECONDS:-8}"
      ARTHAS_TARGET_IP: "${ARTHAS_TARGET_IP:-0.0.0.0}"
      ARTHAS_TELNET_PORT: "3658"
      ARTHAS_HTTP_PORT: "8563"
    ports:
      - target: 8083
        published: "8083"
        protocol: tcp
      - target: 3658
        published: "36583"
        protocol: tcp
      - target: 8563
        published: "85633"
        protocol: tcp
    volumes:
      - ./logs/service-c:/app/logs
      - ./skywalking/agent:/skywalking/agent:ro
    security_opt:
      - seccomp=unconfined
    networks:
      - pms-demo-net

  service-b:
    container_name: pms-demo-service-b
    image: ghcr.io/xywhnh/pms-demo-ai-service-b:latest
    restart: unless-stopped
    depends_on:
      - service-c
    environment:
      SERVICE_C_BASE_URL: ${SERVICE_C_BASE_URL:-http://service-c:8083}
      SW_AGENT_NAME: demo-service-b
      SW_AGENT_INSTANCE_NAME: ${HOSTNAME:-app}-service-b
      SW_AGENT_NAMESPACE: ${SW_AGENT_NAMESPACE:-pms-demo}
      SW_AGENT_CLUSTER: ${SW_AGENT_CLUSTER:-default}
      SW_LOGGING_OUTPUT: CONSOLE
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: ${SW_AGENT_COLLECTOR_BACKEND_SERVICES:-10.0.105.128:11800}
      SW_GRPC_LOG_SERVER_HOST: ${SW_GRPC_LOG_SERVER_HOST:-10.0.105.128}
      SW_GRPC_LOG_SERVER_PORT: ${SW_GRPC_LOG_SERVER_PORT:-11800}
      JAVA_TOOL_OPTIONS: -javaagent:/skywalking/agent/skywalking-agent.jar
      ARTHAS_ENABLED: "${ARTHAS_ENABLED:-true}"
      ARTHAS_START_DELAY_SECONDS: "${ARTHAS_START_DELAY_SECONDS:-8}"
      ARTHAS_TARGET_IP: "${ARTHAS_TARGET_IP:-0.0.0.0}"
      ARTHAS_TELNET_PORT: "3658"
      ARTHAS_HTTP_PORT: "8563"
    ports:
      - target: 8082
        published: "8082"
        protocol: tcp
      - target: 3658
        published: "36582"
        protocol: tcp
      - target: 8563
        published: "85632"
        protocol: tcp
    volumes:
      - ./logs/service-b:/app/logs
      - ./skywalking/agent:/skywalking/agent:ro
    security_opt:
      - seccomp=unconfined
    networks:
      - pms-demo-net

  service-a:
    container_name: pms-demo-service-a
    image: ghcr.io/xywhnh/pms-demo-ai-service-a:latest
    restart: unless-stopped
    depends_on:
      - service-b
      - service-c
    environment:
      SERVICE_B_BASE_URL: ${SERVICE_B_BASE_URL:-http://service-b:8082}
      SERVICE_C_BASE_URL: ${SERVICE_C_BASE_URL:-http://service-c:8083}
      SW_AGENT_NAME: demo-service-a
      SW_AGENT_INSTANCE_NAME: ${HOSTNAME:-app}-service-a
      SW_AGENT_NAMESPACE: ${SW_AGENT_NAMESPACE:-pms-demo}
      SW_AGENT_CLUSTER: ${SW_AGENT_CLUSTER:-default}
      SW_LOGGING_OUTPUT: CONSOLE
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: ${SW_AGENT_COLLECTOR_BACKEND_SERVICES:-10.0.105.128:11800}
      SW_GRPC_LOG_SERVER_HOST: ${SW_GRPC_LOG_SERVER_HOST:-10.0.105.128}
      SW_GRPC_LOG_SERVER_PORT: ${SW_GRPC_LOG_SERVER_PORT:-11800}
      JAVA_TOOL_OPTIONS: -javaagent:/skywalking/agent/skywalking-agent.jar
      ARTHAS_ENABLED: "${ARTHAS_ENABLED:-true}"
      ARTHAS_START_DELAY_SECONDS: "${ARTHAS_START_DELAY_SECONDS:-8}"
      ARTHAS_TARGET_IP: "${ARTHAS_TARGET_IP:-0.0.0.0}"
      ARTHAS_TELNET_PORT: "3658"
      ARTHAS_HTTP_PORT: "8563"
    ports:
      - target: 8081
        published: "8081"
        protocol: tcp
      - target: 3658
        published: "36581"
        protocol: tcp
      - target: 8563
        published: "85631"
        protocol: tcp
    volumes:
      - ./logs/service-a:/app/logs
      - ./skywalking/agent:/skywalking/agent:ro
    security_opt:
      - seccomp=unconfined
    networks:
      - pms-demo-net

networks:
  pms-demo-net:
    driver: bridge
